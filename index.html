<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, minimum-scale=1, initial-scale=1, user-scalable=yes">
    <title>portal</title>
    <meta name="description" content="A dead simple - but nice - tile portal.">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#263238">
    <style>
        /* Theme tokens. `data-theme` on <html> is set to "light" or "dark"
           (resolved from the user's choice or the system preference). */
        html[data-theme="dark"] {
            color-scheme: dark;
            --bg: #37474f;
            --bar-bg: #263238;
            --bar-fg: #ffffff;
            --accent: #4dd0e1;
            --tile-bg: #263238;
            --tile-fg: #cfd8dc;
            --tile-title: #90a4ae;
            --heading-fg: #eceff1;
            --muted: #90a4ae;
            --border: rgba(255, 255, 255, 0.25);
            --tile-shadow: rgba(0, 0, 0, 0.4);
            --tile-shadow-hover: rgba(0, 0, 0, 0.5);
            --tile-shadow-active: rgba(0, 0, 0, 0.6);
            --hover-overlay: rgba(255, 255, 255, 0.1);
            /* White logos already contrast with the dark tile, but black-fill
               logos vanish — trace a light halo around the alpha so they stay
               visible. (A dark halo here wouldn't help a dark logo.) */
            --img-filter:
                drop-shadow(0 0 1px rgba(255, 255, 255, 0.55))
                drop-shadow(0 0 1.5px rgba(255, 255, 255, 0.4));
        }

        html[data-theme="light"] {
            color-scheme: light;
            --bg: #eceff1;
            --bar-bg: #ffffff;
            --bar-fg: #263238;
            --accent: #00838f;
            --tile-bg: #ffffff;
            --tile-fg: #37474f;
            --tile-title: #607d8b;
            --heading-fg: #263238;
            --muted: #607d8b;
            --border: rgba(0, 0, 0, 0.2);
            --tile-shadow: rgba(0, 0, 0, 0.16);
            --tile-shadow-hover: rgba(0, 0, 0, 0.24);
            --tile-shadow-active: rgba(0, 0, 0, 0.32);
            --hover-overlay: rgba(0, 0, 0, 0.06);
            /* Trace a dark halo around logo alpha so white-fill PNGs stay
               visible on the light tile. Layered drop-shadows follow the
               logo's shape (not its bounding box) for an outline effect. */
            --img-filter:
                drop-shadow(0 0 1px rgba(0, 0, 0, 0.6))
                drop-shadow(0 0 1.5px rgba(0, 0, 0, 0.45));
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background-color: var(--bg, #37474f);
        }
    </style>
    <script>
        // Apply the saved theme before first paint to avoid a flash.
        (function () {
            try {
                var mode = localStorage.getItem('portal-theme') || 'system';
                var resolved = mode === 'system'
                    ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
                    : mode;
                document.documentElement.dataset.theme = resolved;
            } catch (e) {
                document.documentElement.dataset.theme = 'dark';
            }
        })();
    </script>
    <script type="module" src="src/nice-portal-app.js"></script>
</head>
<body>
    <nice-portal-app></nice-portal-app>
</body>
</html>
